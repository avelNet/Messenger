<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>Messenger</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Auth -->
<div id="screen-auth" class="screen">
  <div class="auth-wrap">
    <div class="auth-logo">✦</div>
    <h1>Messenger</h1>
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Войти</button>
      <button class="tab-btn" data-tab="register">Регистрация</button>
    </div>
    <div id="tab-login" class="tab-content">
      <input id="login-username" type="text" placeholder="@username" autocomplete="username"/>
      <input id="login-password" type="password" placeholder="Пароль" autocomplete="current-password"/>
      <button id="btn-login" class="btn-primary">Войти</button>
    </div>
    <div id="tab-register" class="tab-content hidden">
      <input id="reg-display-name" type="text" placeholder="Ваше имя" maxlength="32"/>
      <input id="reg-password" type="password" placeholder="Пароль (мин. 4 символа)" autocomplete="new-password"/>
      <button id="btn-register" class="btn-primary">Далее →</button>
    </div>
    <p id="auth-error" class="error"></p>
  </div>
</div>

<!-- Username setup (шаг 2 регистрации) -->
<div id="screen-username" class="screen hidden">
  <div class="auth-wrap">
    <div class="auth-logo">✦</div>
    <h1>Выберите username</h1>
    <p class="auth-hint">По нему вас смогут найти другие пользователи</p>
    <div class="username-input-wrap">
      <span class="username-at">@</span>
      <input id="setup-username" type="text" placeholder="username" maxlength="32" autocomplete="off" spellcheck="false"/>
    </div>
    <p id="username-check" class="username-check"></p>
    <button id="btn-confirm-username" class="btn-primary" disabled>Готово</button>
    <p id="username-error" class="error"></p>
  </div>
</div>

<!-- Main -->
<div id="screen-main" class="screen hidden">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="me-avatar" id="me-avatar"></div>
      <div class="me-info">
        <span id="my-display-name"></span>
        <span class="me-id">ID: <strong id="my-id"></strong></span>
      </div>
      <button id="btn-profile" class="icon-btn" title="Профиль">⚙</button>
      <button id="btn-add" class="icon-btn add-btn" title="Найти пользователя">🔍</button>
    </div>
    <div id="contacts-list"></div>
  </div>

  <div class="chat" id="chat-panel">
    <div class="chat-top" id="chat-top">
      <button id="btn-back" class="icon-btn back-btn">←</button>
      <div class="chat-peer-avatar" id="chat-peer-avatar" style="cursor:pointer" title="Профиль"></div>
      <div class="chat-peer-info" style="cursor:pointer" id="chat-peer-info-click">
        <span id="chat-title">Выберите контакт</span>
        <span id="chat-status" class="chat-status"></span>
      </div>
    </div>
    <div id="messages" class="messages"></div>
    <div class="composer">
      <input id="msg-input" type="text" placeholder="Сообщение..." disabled autocomplete="off"/>
      <button id="btn-send" class="send-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Profile modal (свой) -->
<div id="modal-profile" class="modal hidden">
  <div class="modal-box profile-box">
    <div class="profile-header">
      <h3>Мой профиль</h3>
      <button id="btn-close-profile" class="icon-btn">✕</button>
    </div>

    <div class="avatar-upload-wrap">
      <div id="profile-avatar-preview" class="avatar-lg" style="cursor:pointer" title="Нажмите чтобы загрузить фото"></div>
      <input id="avatar-file-input" type="file" accept="image/*" style="display:none"/>
      <span class="avatar-upload-hint">Нажмите на аватар чтобы изменить</span>
    </div>

    <div class="color-swatches" id="color-swatches"></div>

    <div class="profile-field">
      <label>Имя</label>
      <input id="profile-display-name" type="text" maxlength="32"/>
    </div>
    <div class="profile-field">
      <label>@username</label>
      <input id="profile-username-show" type="text" disabled/>
    </div>
    <div class="profile-field">
      <label>О себе</label>
      <textarea id="profile-bio" maxlength="120" rows="2"></textarea>
    </div>
    <div class="profile-field">
      <label>ID</label>
      <div class="copy-field">
        <span id="profile-id-show"></span>
        <button id="btn-copy-id" class="copy-btn">Копировать</button>
      </div>
    </div>

    <button id="btn-save-profile" class="btn-primary">Сохранить</button>

    <div class="divider"></div>

    <div class="profile-field">
      <label>Сменить пароль</label>
      <input id="old-password" type="password" placeholder="Текущий пароль"/>
      <input id="new-password" type="password" placeholder="Новый пароль (мин. 4)"/>
      <input id="new-password2" type="password" placeholder="Повторите новый пароль"/>
    </div>
    <button id="btn-change-password" class="btn-secondary-full">Сменить пароль</button>
    <p id="password-msg" class="error"></p>

    <div class="divider"></div>
    <button id="btn-logout" class="btn-logout">Выйти из аккаунта</button>
  </div>
</div>

<!-- Чужой профиль -->
<div id="modal-peer-profile" class="modal hidden">
  <div class="modal-box profile-box">
    <div class="profile-header">
      <h3>Профиль</h3>
      <button id="btn-close-peer-profile" class="icon-btn">✕</button>
    </div>
    <div class="peer-profile-avatar-wrap">
      <div id="peer-avatar" class="avatar-lg"></div>
    </div>
    <div class="peer-profile-name" id="peer-display-name"></div>
    <div class="peer-profile-username" id="peer-username"></div>
    <div class="peer-profile-bio" id="peer-bio"></div>
    <div class="peer-profile-lastseen" id="peer-lastseen"></div>
  </div>
</div>

<!-- Add contact modal -->
<div id="modal-add" class="modal hidden">
  <div class="modal-box">
    <h3>Найти пользователя</h3>
    <div class="username-input-wrap">
      <span class="username-at">@</span>
      <input id="search-username-input" type="text" placeholder="username" maxlength="32" autocomplete="off"/>
    </div>
    <div id="found-user-preview" class="found-user hidden"></div>
    <div class="modal-btns">
      <button id="btn-confirm-add" class="btn-primary">Добавить</button>
      <button id="btn-cancel-add" class="btn-secondary">Отмена</button>
    </div>
    <p id="add-error" class="error"></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
